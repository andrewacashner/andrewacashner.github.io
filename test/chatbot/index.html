<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="chat.css" />
    <script defer src="chat.js"></script>
  </head>
  <body>
    <header>
      <h1>Wikipedia Knowledge Bot</h1>
    </header>
    <main>
      <div class="chat-window">
        <div id="chat-messages" class="chat-messages">
          <div class="chat-message chat-message-from">
            <p>Hello! What can I help you learn about today?</p>
          </div>
        </div>
        <form id="text-input" class="text-input">
          <input name="query" type="text"></input>
          <button type="submit" id="send-button" class="send-button">⌲</button>
        </div>
    </main>
    <footer>
      <p>Created by Joshua Taylor, Andrew Cashner, and Bowen Zhao</p>
    </footer>
  </body>
</html>
